<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Euro Trip 2026 - 行程管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --uk-warm-tan: #fdfaf1; --uk-blue: #e0f2f7; --uk-red: #b22222; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--uk-blue); }
        .serif { font-family: 'Playfair Display', serif; }
        .main-content { 
            background-color: var(--uk-warm-tan); 
            border-top-left-radius: 35px; border-top-right-radius: 35px;
            margin-top: -40px; position: relative; min-height: 900px;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.05);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .date-card-active { background-color: #4a5d4e; color: white !important; }
        .modal-bg { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
    </style>
</head>
<body>

<div id="app" class="max-w-md mx-auto relative pb-24">
    <header class="relative h-[250px] overflow-hidden">
        <img src="webappbanner.jpg" class="w-full h-full object-cover" alt="Banner">
        <div class="absolute bottom-12 right-4 flex space-x-2 z-20">
            <button v-for="t in tabs" :key="t.id" @click="currentTab = t.id" 
                class="w-10 h-10 rounded-full bg-white shadow-lg flex items-center justify-center transition-all"
                :class="{'ring-2 ring-red-800 text-red-800': currentTab === t.id, 'text-stone-400': currentTab !== t.id}">
                <i :data-lucide="t.icon" class="w-5 h-5"></i>
            </button>
        </div>
    </header>

    <main class="main-content p-6">
        
        <section v-if="currentTab === 'itinerary'">
            <div class="mb-4 flex items-center justify-between bg-white/60 p-3 rounded-2xl">
                <div class="flex items-center"><i data-lucide="cloud-sun" class="text-orange-400 mr-2"></i><span class="text-sm font-medium">倫敦 12°C</span></div>
                <div class="text-[10px] text-stone-400">2026/03/10</div>
            </div>

            <div class="flex space-x-3 overflow-x-auto no-scrollbar pb-4 mb-2">
                <div v-for="d in dateRange" :key="d.date" @click="selectedDate = d.date"
                    class="flex-shrink-0 w-14 h-20 rounded-2xl flex flex-col items-center justify-center transition-all cursor-pointer bg-white shadow-sm"
                    :class="{'date-card-active': selectedDate === d.date, 'text-stone-400': selectedDate !== d.date}">
                    <span class="text-[10px] font-bold uppercase">{{ d.week }}</span>
                    <span class="text-xl font-bold">{{ d.day }}</span>
                </div>
            </div>

            <div id="itinerary-list" class="space-y-4">
                <div v-for="(item, idx) in filteredItinerary" :key="item.id" class="item-card">
                    <div v-if="item.category === '航班'" class="bg-slate-800 p-4 rounded-2xl text-white shadow-md relative">
                        <button @click="deleteItem(item.id)" class="absolute top-2 right-2 opacity-50"><i data-lucide="x" class="w-4 h-4"></i></button>
                        <div class="flex justify-between items-center mb-2 text-[10px] opacity-70">
                            <span>{{item.flightNo || '航班資訊'}}</span>
                            <span>{{item.date}}</span>
                        </div>
                        <div class="flex justify-between items-center text-center">
                            <div><p class="text-xl font-bold">{{item.dep || 'HKG'}}</p><p class="text-[10px] opacity-70">10:40</p></div>
                            <i data-lucide="plane" class="w-4 h-4 text-white/40"></i>
                            <div><p class="text-xl font-bold">{{item.arr || 'LHR'}}</p><p class="text-[10px] opacity-70">17:20</p></div>
                        </div>
                    </div>

                    <div v-else class="bg-white p-4 rounded-2xl shadow-sm border border-stone-100 flex justify-between items-center group">
                        <div class="flex-1" @click="openNav(item.name)">
                            <div class="flex items-center space-x-2 mb-1">
                                <span class="text-[9px] px-2 py-0.5 rounded-full bg-stone-100 text-stone-500 font-bold">{{item.category}}</span>
                            </div>
                            <h3 class="font-bold text-stone-800 text-sm">{{item.name}}</h3>
                            <p v-if="item.note" class="text-[11px] text-stone-400 mt-1 italic">{{item.note}}</p>
                        </div>
                        <div class="flex items-center space-x-3">
                            <i data-lucide="navigation" class="text-blue-500 w-4 h-4" @click="openNav(item.name)"></i>
                            <button @click="deleteItem(item.id)" class="text-stone-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <button @click="showModal = true" class="fixed bottom-28 right-6 w-14 h-14 bg-red-800 text-white rounded-full shadow-2xl flex items-center justify-center z-50 hover:scale-110 transition">
                <i data-lucide="plus" class="w-8 h-8"></i>
            </button>
        </section>

        <section v-if="currentTab !== 'itinerary'" class="text-center py-20 text-stone-400">
            <i data-lucide="construction" class="w-12 h-12 mx-auto mb-4"></i>
            <p>此分頁功能開發中...</p>
        </section>
    </main>

    <div v-if="showModal" class="fixed inset-0 z-[100] modal-bg flex items-end">
        <div class="bg-white w-full rounded-t-[35px] p-8 animate-slide-up">
            <div class="flex justify-between items-center mb-6">
                <h2 class="serif text-xl text-stone-800">新增行程</h2>
                <button @click="showModal = false" class="text-stone-400"><i data-lucide="x"></i></button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-stone-400 block mb-1">行程分類</label>
                    <select v-model="newItem.category" class="w-full bg-stone-50 p-3 rounded-xl outline-none text-sm border-none">
                        <option v-for="cat in categories" :value="cat">{{cat}}</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs font-bold text-stone-400 block mb-1">名稱 / 地點</label>
                    <input v-model="newItem.name" type="text" placeholder="例如：大笨鐘" class="w-full bg-stone-50 p-3 rounded-xl outline-none text-sm">
                </div>
                <div>
                    <label class="text-xs font-bold text-stone-400 block mb-1">備註</label>
                    <textarea v-model="newItem.note" placeholder="例如：記得帶相機..." class="w-full bg-stone-50 p-3 rounded-xl outline-none text-sm h-20"></textarea>
                </div>
                <button @click="saveItem" class="w-full bg-red-800 text-white py-4 rounded-2xl font-bold shadow-lg active:bg-red-900 transition mt-4">確認儲存</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-stone-100 px-8 py-3 flex justify-between items-center z-40 max-w-md mx-auto rounded-t-3xl">
        <button v-for="t in tabs" :key="t.id" @click="currentTab = t.id" class="flex flex-col items-center" :class="currentTab === t.id ? 'text-red-800' : 'text-stone-300'">
            <i :data-lucide="t.icon" class="w-6 h-6"></i>
            <span class="text-[9px] font-bold mt-1">{{t.name}}</span>
        </button>
    </nav>
</div>

<script>
const { createApp, ref, computed, onMounted, watch, nextTick } = Vue;

createApp({
    setup() {
        const currentTab = ref('itinerary');
        const selectedDate = ref('2026-03-10');
        const showModal = ref(false);
        
        const tabs = [
            { id: 'itinerary', name: '行程', icon: 'map-pin' },
            { id: 'info', name: '資訊', icon: 'info' },
            { id: 'shopping', name: '清單', icon: 'shopping-basket' },
            { id: 'expense', name: '花費', icon: 'banknote' }
        ];

        const dateRange = [
            { week: 'Tue', day: '10', date: '2026-03-10' },
            { week: 'Wed', day: '11', date: '2026-03-11' },
            { week: 'Thu', day: '12', date: '2026-03-12' },
            { week: 'Fri', day: '13', date: '2026-03-13' },
            { week: 'Sat', day: '14', date: '2026-03-14' }
        ];

        const categories = ['景點', '美食', '住宿', '購物', '航班', '其他'];

        const itineraries = ref([
            { id: 1, date: '2026-03-10', category: '航班', name: 'CX239', flightNo: 'CX239' },
            { id: 2, date: '2026-03-10', category: '美食', name: "Kitty's Fisher Mayfair", note: '20:15 預約' }
        ]);

        const newItem = ref({ category: '景點', name: '', note: '' });

        const filteredItinerary = computed(() => {
            return itineraries.value.filter(i => i.date === selectedDate.value);
        });

        const saveItem = () => {
            if (!newItem.value.name) return alert('請輸入名稱！');
            itineraries.value.push({
                id: Date.now(),
                date: selectedDate.value,
                ...newItem.value
            });
            showModal.value = false;
            newItem.value = { category: '景點', name: '', note: '' };
            initLucide();
        };

        const deleteItem = (id) => {
            if (confirm('確定要刪除這個行程嗎？')) {
                itineraries.value = itineraries.value.filter(i => i.id !== id);
                initLucide();
            }
        };

        const openNav = (name) => {
            window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name)}`, '_blank');
        };

        const initLucide = () => {
            nextTick(() => lucide.createIcons());
        };

        onMounted(() => {
            initLucide();
            const el = document.getElementById('itinerary-list');
            if (el) Sortable.create(el, { animation: 150 });
        });

        watch([currentTab, selectedDate, showModal], initLucide);

        return { currentTab, tabs, dateRange, selectedDate, filteredItinerary, showModal, categories, newItem, saveItem, deleteItem, openNav };
    }
}).mount('#app');
</script>

<style>
@keyframes slide-up {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
}
.animate-slide-up { animation: slide-up 0.3s ease-out; }
</style>
</body>
</html>
